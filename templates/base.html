<link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
<body>

<nav class="navbar">
    <div class="navbar-container">

        <a class="navbar-brand" href="{{ url_for('main_bp.index') }}">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Titanic Logo">
            <span>Titanic Predictor</span>
        </a>

        {% if current_user.is_authenticated %}

            <div class="navbar-center logged-nav">
                <a href="{{ url_for('main_bp.index') }}"
                   class="{% if request.endpoint == 'main_bp.index' %}active{% endif %}">
                    Home
                </a>

                <a href="{{ url_for('main_bp.about') }}"
                   class="{% if request.endpoint == 'main_bp.about' %}active{% endif %}">
                    About
                </a>

                <a href="{{ url_for('main_bp.dashboard') }}"
                   class="{% if request.endpoint == 'main_bp.dashboard' %}active{% endif %}">
                    Dashboard
                </a>

                <a href="{{ url_for('main_bp.predict') }}">Predict</a>
                <a href="{{ url_for('main_bp.train_model') }}">Train Model</a>
                <a href="{{ url_for('main_bp.results') }}">Results</a>
            </div>

            <div class="navbar-right logged-user">
                <span class="user-greeting">
                    Hi, {{ current_user.username }}
                </span>

                <a class="logout-btn" href="{{ url_for('auth.logout') }}">
                    Logout
                </a>
            </div>

        {% else %}

            <div class="navbar-center">
                <a href="{{ url_for('main_bp.index') }}"
                   class="{% if request.endpoint == 'main_bp.index' %}active{% endif %}">
                    Home
                </a>

                <a href="{{ url_for('main_bp.about') }}"
                   class="{% if request.endpoint == 'main_bp.about' %}active{% endif %}">
                    About
                </a>
            </div>

            <div class="navbar-right">
                <a class="login-link" href="{{ url_for('auth.login') }}">
                    Login
                </a>

                <a class="register-btn" href="{{ url_for('auth.register') }}">
                    Register
                </a>
            </div>

        {% endif %}

    </div>
</nav>

<div class="page-content">
    {% block content %}{% endblock %}
</div>

</body>
